name: Release

on:
  release:
    types: [published]
  pull_request:
    paths:
      - .github/workflows/release.yml

jobs:
  build:
    uses: ./.github/workflows/build.yml

  upload-release-assets:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Kopernicus
          path: Kopernicus

      - uses: actions/download-artifact@v8
        with:
          name: Kopernicus.version

      - name: Get version from release tag
        if: github.event_name == 'release'
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#release-}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Read version from 00Version.cfg
        if: github.event_name != 'release'
        run: |
          VERSION=$(grep -oP 'KopernicusVersion\s*=\s*\K\d+' Kopernicus/GameData/Kopernicus/Config/00Version.cfg)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create release zip
        run: |
          cd Kopernicus
          zip -r "../Kopernicus-1.12.1-${VERSION}.zip" *

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" "Kopernicus-1.12.1-${VERSION}.zip" Kopernicus.version

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: Kopernicus-1.12.1-${{ env.VERSION }}
          path: Kopernicus-1.12.1-${{ env.VERSION }}.zip
