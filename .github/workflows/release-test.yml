ame: Release-Test

on:
  push:
  pull_request:

jobs:
  build:
    uses: ./.github/workflows/build.yml

  upload-release-assets:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Kopernicus
          path: Kopernicus

      - uses: actions/download-artifact@v8
        with:
          name: Kopernicus.version

      - name: Read version from 00Version.cfg
        run: |
          VERSION=$(grep -oP 'KopernicusVersion\s*=\s*\K\d+' Kopernicus/GameData/Kopernicus/Config/00Version.cfg)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create release zip
        run: |
          cd Kopernicus
          zip -r "../Kopernicus-1.12.1-${VERSION}.zip" *

      - uses: actions/upload-artifact@v7
        with:
          name: Kopernicus-1.12.1-${{ env.VERSION }}
          path: Kopernicus-1.12.1-${{ env.VERSION }}.zip
