
Kopernicus_config_backup { }

// Create a copy of the config node right before we apply any user settings.
// This will be used to determine which settings should be included in the
// settings patch file.
@Kopernicus_config_backup:LAST[zKopernicus]
{
    %__kopConfigCount = 0
    #@Kopernicus_config,0 { }
}

// To avoid losing settings for old versions we copy all of their values
// into the first config node.

@Kopernicus_config:LAST[zKopernicus]
{
    %__kopHasDuplicates = false
    %__kopConfigIndex = #$@Kopernicus_config_backup/__kopConfigCount$
    *@Kopernicus_config_backup/__kopConfigCount += 1
}

@Kopernicus_config:HAS[#__kopConfigIndex[>0]]:LAST[zKopernicus]
{
    %name = #KopConfig$__kopConfigIndex$
    *@Kopernicus_config/__kopHasDuplicates = true
}

// Now copy all settings from the duplicate node
@Kopernicus_config:HAS[#__kopHasDuplicates[true]]:LAST[zKopernicus]
{
    #@Kopernicus_config[KopConfig1]
    {
        // Ensure that everything has a value of some sort.
        &EnforceShaders                        = true
        &WarnShaders                           = false
        &EnforcedShaderLevel                   = 2
        &UseKopernicusAsteroidSystem           = true
        &SolarRefreshRate                      = true
        &EnableKopernicusShadowManager         = true
        &ShadowRangeCap                        = true
        &DisableMainMenuMunScene               = true
        &KSCLightsAlwaysOn                     = false
        &UseOriginalKSC2                       = false
        &HandleHomeworldAtmosphericUnitDisplay = true
        &UseIncorrectScatterDensityLogic       = false
        &DisableFarAwayColliders               = true
        &EnableAtmosphericExtinction           = false
        &UseStockMohoTemplate                  = true
        &UseOnDemandLoader                     = false
        &UseRealWorldDensity                   = false
        &ApplyDensityMultToMinorObjects        = 1
        &RecomputeSOIAndHillSpheres            = false
        &PrincipiaFriendlySOIComputation       = false
        &LimitRWDensityToStockBodies           = true
        &UseOlderRWScalingLogic                = false
        &RescaleFactor                         = 1
        &RealWorldSizeFactor                   = 10.625
        &SelectedPQSQuality                    = High
    }
}

@Kopernicus_config:HAS[#__kopHasDuplicates[true]]:LAST[zKopernicus]
{
    %EnforceShaders                        = #$Kopernicus_config/EnforceShaders$
    %WarnShaders                           = #$Kopernicus_config/WarnShaders$
    %EnforcedShaderLevel                   = #$Kopernicus_config/EnforcedShaderLevel$
    %UseKopernicusAsteroidSystem           = #$Kopernicus_config/UseKopernicusAsteroidSystem$
    %SolarRefreshRate                      = #$Kopernicus_config/SolarRefreshRate$
    %EnableKopernicusShadowManager         = #$Kopernicus_config/EnableKopernicusShadowManager$
    %ShadowRangeCap                        = #$Kopernicus_config/ShadowRangeCap$
    %DisableMainMenuMunScene               = #$Kopernicus_config/DisableMainMenuMunScene$
    %KSCLightsAlwaysOn                     = #$Kopernicus_config/KSCLightsAlwaysOn$
    %UseOriginalKSC2                       = #$Kopernicus_config/UseOriginalKSC2$
    %HandleHomeworldAtmosphericUnitDisplay = #$Kopernicus_config/HandleHomeworldAtmosphericUnitDisplay$
    %UseIncorrectScatterDensityLogic       = #$Kopernicus_config/UseIncorrectScatterDensityLogic$
    %DisableFarAwayColliders               = #$Kopernicus_config/DisableFarAwayColliders$
    %EnableAtmosphericExtinction           = #$Kopernicus_config/EnableAtmosphericExtinction$
    %UseStockMohoTemplate                  = #$Kopernicus_config/UseStockMohoTemplate$
    %UseOnDemandLoader                     = #$Kopernicus_config/UseOnDemandLoader$
    %UseRealWorldDensity                   = #$Kopernicus_config/UseRealWorldDensity$
    %ApplyDensityMultToMinorObjects        = #$Kopernicus_config/ApplyDensityMultToMinorObjects$
    %RecomputeSOIAndHillSpheres            = #$Kopernicus_config/RecomputeSOIAndHillSpheres$
    %PrincipiaFriendlySOIComputation       = #$Kopernicus_config/PrincipiaFriendlySOIComputation$
    %LimitRWDensityToStockBodies           = #$Kopernicus_config/LimitRWDensityToStockBodies$
    %UseOlderRWScalingLogic                = #$Kopernicus_config/UseOlderRWScalingLogic$
    %RescaleFactor                         = #$Kopernicus_config/RescaleFactor$
    %RealWorldSizeFactor                   = #$Kopernicus_config/RealWorldSizeFactor$
    %SelectedPQSQuality                    = #$Kopernicus_config/SelectedPQSQuality$
}

// The delete all the duplicate config nodes
!Kopernicus_config:HAS[#__kopConfigIndex[>0]]:LAST[zKopernicus] { }

// And clean up the rest
@Kopernicus_config:LAST[zKopernicus]
{
    !__kopConfigIndex = delete
    !__kopHasDuplicates = delete
    !Kopernicus_config { }
}

// And clean up the rest
@Kopernicus_config_backup:LAST[zKopernicus]
{
    !__kopConfigCount = delete
}
